      {
        "@type": "Question",
        "name": "What is the difference between an advisory and a failure?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "A failure means your vehicle doesn’t meet the legal minimum standard and can’t be driven (except to a pre-booked repair or retest) until it’s fixed. An advisory means it passed, but the tester has noted something that will need attention before it becomes a failure."
        }
      },
      {
        "@type": "Question",
        "name": "Can I drive with an MOT advisory?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Yes. An advisory doesn’t affect the validity of your MOT certificate, so the vehicle remains road-legal for the full 12 months. You’re still responsible for keeping the car roadworthy — if an advisory item deteriorates into a dangerous defect, driving on it could become an offence."
        }
      },
      {
        "@type": "Question",
        "name": "Do advisories carry over to the next MOT?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Advisories don’t automatically transfer, but they stay on your vehicle’s permanent MOT history record. At the next test the examiner re-assesses each item from scratch, so a previous advisory may clear, stay, or become a failure depending on its condition on the day."
        }
      },
      {
        "@type": "Question",
        "name": "How do I check my MOT advisories online?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Enter your registration into RegScan and you’ll see your full MOT history, including every advisory and failure recorded against the vehicle, pulled directly from the official DVSA data. It’s free, and you can set a reminder so you never miss the renewal date."
        }
      },
      {
        "@type": "Question",
        "name": "Will an advisory affect my insurance?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "An advisory on its own won’t change your premium. However, if you knowingly leave a safety-related advisory unrepaired and it contributes to an accident, an insurer could question whether the vehicle was roadworthy, which may affect a claim."
        }
      }
    ]
  }
